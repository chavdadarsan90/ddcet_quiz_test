<!DOCTYPE html>
<html>
<head>
    <title>DDCET Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-5 border-0 rounded-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center text-success fw-bold mb-4">Create Account</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3 rounded-pill">Sign Up</button>
        </form>
        <div class="text-center mt-3">
            <p>Already have an account? <a href="/login/">Login here</a></p>
        </div>
    </div>
</body>
</html>
